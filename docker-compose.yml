version: '3.9'

services:
  # PostgreSQL Database
  db:
    image: postgres:18-alpine
    container_name: pytomnic_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pytomnic}
      POSTGRES_USER: ${POSTGRES_USER:-pytomnic_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pytomnic123}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pytomnic_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - pytomnic_network

  # Redis Cache & Message Broker
  redis:
    image: redis:7-alpine
    container_name: pytomnic_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - pytomnic_network

  # Django Web Application
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pytomnic_web
    command: gunicorn --bind 0.0.0.0:8000 --workers 4 --worker-class uvicorn.workers.UvicornWorker --timeout 120 core.asgi:application
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - logs_volume:/app/logs
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - pytomnic_network

  # Celery Worker (обработка асинхронных задач)
  celery:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pytomnic_celery
    command: celery -A core worker -l info -c 4
    volumes:
      - .:/app
      - logs_volume:/app/logs
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - db
      - redis
      - web
    restart: unless-stopped
    networks:
      - pytomnic_network

  # Celery Beat (периодические задачи)
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pytomnic_celery_beat
    command: celery -A core beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/app
      - logs_volume:/app/logs
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - db
      - redis
      - web
    restart: unless-stopped
    networks:
      - pytomnic_network

  # NGINX Reverse Proxy (опционально для production)
  nginx:
    image: nginx:alpine
    container_name: pytomnic_nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - web
    restart: unless-stopped
    networks:
      - pytomnic_network

volumes:
  postgres_data:
    driver: local
  static_volume:
    driver: local
  media_volume:
    driver: local
  logs_volume:
    driver: local

networks:
  pytomnic_network:
    driver: bridge